<!DOCTYPE html>

    <title>다음 가설 보드</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-site-kind="preview">
    <div class="site-shell">
      <header class="site-topbar">
        <div class="site-brand">
          <span class="site-brand__dot"></span>

        <nav class="site-nav" aria-label="다음 가설 보드 탐색">

        <section class="site-content">

              <strong>수사 보드 준비 중</strong>

      <footer class="site-footer">
